network_g:
  type: MambaIRv2
  upscale: 1
  in_chans: 3
  img_size: 128
  img_range: 1.
  embed_dim: 96
  d_state: 16
  depths: [4, 4, 4, 4]
  num_heads: [4, 4, 4, 4]
  window_size: 16
  inner_rank: 48
  num_tokens: 96
  convffn_kernel_size: 5
  mlp_ratio: 2.

path:
  pretrain_network_g: ~   # run_test_duct8.sh 가 최신 weight 로 자동 교체
  strict_load_g: true
  results_root: /home/euna.kwon/01_data/02_jsolution_duct/duct8_sample/mambair_results

val:
  save_img: true
  suffix: ~
  skip_existing: true
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false
