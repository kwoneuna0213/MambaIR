name: MambaIRv2_WindRemoval_Optimized
model_type: MambaIRv2Model
scale: 1
num_gpu: 4
manual_seed: 10

datasets:
  test_single:
    name: single
    type: PairedImageDataset
    dataroot_gt: /tmp/mamba_single/gt
    dataroot_lq: /tmp/mamba_single/lq
    filename_tmpl: '{}'
    io_backend:
      type: disk

network_g:
  type: MambaIRv2
  upscale: 1
  in_chans: 3
  img_size: 128
  img_range: 1.
  embed_dim: 96
  d_state: 16
  depths: [4, 4, 4, 4]
  num_heads: [4, 4, 4, 4]
  window_size: 16
  inner_rank: 48
  num_tokens: 96
  convffn_kernel_size: 5
  mlp_ratio: 2.

path:
  pretrain_network_g: /ssd2/home/euna.kwon/MambaIR/experiments/MambaIRv2_WindRemoval_Optimized/models/net_g_66000.pth
  strict_load_g: true
  results_root: /home/euna.kwon/01_data/02_jsolution_duct/02_mambair

val:
  save_img: true
  suffix: ~
